<!doctype html><html><head>
<!-- Testes de lógica pura (rode headless; ver CLAUDE.md > Verificação).
     Exercita searchItems, suggestBox, mergeDocs e boxQrUrl com fixtures.
     Roda síncrono no body (antes do init() do DOMContentLoaded). -->
<script>window.__errs=[]; window.onerror=function(m,s,l){window.__errs.push(m+' @'+(s||'')+':'+l);};</script>
<script src="../lib/qrcode.min.js"></script>
<script src="../js/core.js"></script>
<script src="../js/idb.js"></script>
<script src="../js/photos.js"></script>
<script src="../js/suggest.js"></script>
<script src="../js/search.js"></script>
<script src="../js/boxes.js"></script>
<script src="../js/items.js"></script>
<script src="../js/history.js"></script>
<script src="../js/scan.js"></script>
<script src="../js/locate.js"></script>
<script src="../js/qr.js"></script>
<script src="../js/sync.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/render.js"></script>
<script src="../js/main.js"></script>
</head><body><pre id="out">PENDING</pre>
<script>
var out = [], fail = 0;
function ok(name, cond){ out.push((cond?'OK   ':'FAIL ')+name); if(!cond) fail++; }

var CFG = { categorias: [
  { nome:'Material elétrico', grupo:'Elétrica' },
  { nome:'Cabos e fios', grupo:'Elétrica' },
  { nome:'Jardinagem', grupo:'Jardinagem' },
  { nome:'Ferramentas manuais', grupo:'Ferramentas' }
]};

/* ---------- searchItems: acento/caixa + filtro ---------- */
state = { config: CFG, boxes:[{id:'b1',code:'C-01',name:'Elétrica'}], items:[
  { id:'i1', name:'Parafusos Philips', category:'Ferramentas manuais', boxId:'b1', tags:'metal' },
  { id:'i2', name:'Material elétrico diverso', category:'Material elétrico', boxId:'b1', tags:'tomada' }
], tomb:{boxes:{},items:{}}, meta:{} };
ok('busca ignora acento/caixa (PARAFUSO->Parafusos)', searchItems('PARAFUSO','').length===1 && searchItems('PARAFUSO','')[0].id==='i1');
ok('busca por tag (tomada)', searchItems('tomada','').length===1 && searchItems('tomada','')[0].id==='i2');
ok('busca casa nome da caixa (eletrica)', searchItems('eletrica','').length>=1);
ok('filtro de categoria', searchItems('','Material elétrico').length===1);
ok('busca vazia retorna tudo', searchItems('','').length===2);

/* ---------- suggestBox: grupo + tamanho + createNew ---------- */
function mkItems(boxId, cat, size, n){ var a=[]; for(var i=0;i<n;i++) a.push({id:boxId+'-'+i,name:'x',category:cat,boxId:boxId,size:size}); return a; }

// afinidade de grupo: item de "Cabos e fios" (Elétrica) deve cair na caixa elétrica
state = { config: CFG, boxes:[{id:'b1'},{id:'b2'}], items:
  mkItems('b1','Material elétrico','M',3).concat(mkItems('b2','Jardinagem','M',3)),
  tomb:{boxes:{},items:{}}, meta:{} };
var s1 = suggestBox({ category:'Cabos e fios', size:'M' });
ok('sugere caixa do mesmo grupo (Elétrica)', !s1.createNew && s1.box && s1.box.id==='b1');

// tamanho: entre duas caixas elétricas, item P evita a de itens G
state = { config: CFG, boxes:[{id:'bg'},{id:'bp'}], items:
  mkItems('bg','Material elétrico','G',3).concat(mkItems('bp','Material elétrico','P',3)),
  tomb:{boxes:{},items:{}}, meta:{} };
var s2 = suggestBox({ category:'Cabos e fios', size:'P' });
ok('item P prefere caixa de itens P (evita G)', !s2.createNew && s2.box && s2.box.id==='bp');

// sem caixas: recomenda criar nova
state = { config: CFG, boxes:[], items:[], tomb:{boxes:{},items:{}}, meta:{} };
var s3 = suggestBox({ category:'Cabos e fios', size:'P' });
ok('sem caixa combinando -> createNew', s3.createNew===true && s3.newSeed && s3.newSeed.mainGroup==='Elétrica');

/* ---------- mergeDocs: last-write-wins + lápides ----------
   (timestamps reais: mergeList descarta lápides com +180 dias) */
var T = Date.now();
var A = { config:CFG, boxes:[], items:[{id:'i1',name:'A',updatedAt:T}], tomb:{boxes:{},items:{}}, meta:{updatedAt:T,profileUpdatedAt:0} };
var B = { config:CFG, boxes:[], items:[{id:'i1',name:'A2',updatedAt:T+1000}], tomb:{boxes:{},items:{}}, meta:{updatedAt:T+1000,profileUpdatedAt:0} };
var m1 = mergeDocs(A,B);
ok('merge last-write-wins (i1 -> A2)', m1.items.length===1 && m1.items[0].name==='A2');

var C = { config:CFG, boxes:[], items:[], tomb:{boxes:{},items:{i1:T+2000}}, meta:{updatedAt:T+2000,profileUpdatedAt:0} };
var m2 = mergeDocs(A,C);
ok('lápide remove item deletado', m2.items.length===0);

/* ---------- boxQrUrl ---------- */
ok('boxQrUrl termina com #box=<id>', /#box=abc$/.test(boxQrUrl('abc')));

/* ---------- parseBoxFromText (scanner) ---------- */
state = { config:CFG, boxes:[{id:'b1',code:'C-01'}], items:[], tomb:{boxes:{},items:{}}, meta:{} };
ok('parseBoxFromText extrai id de URL #box=', parseBoxFromText('https://x/app/#box=b1') === 'b1');
ok('parseBoxFromText aceita id puro', parseBoxFromText('b1') === 'b1');
ok('parseBoxFromText ignora caixa inexistente', parseBoxFromText('#box=zzz') === null);

/* ---------- boxFullness (ocupação) ---------- */
ok('boxFullness ok p/ poucos itens', boxFullness(3).cls === 'ok');
ok('boxFullness lotada >= SUGGEST_FULL', boxFullness(SUGGEST_FULL).cls === 'full');
ok('boxFullness quase cheia em ~80%', boxFullness(Math.round(SUGGEST_FULL*0.8)).cls === 'near');

/* ---------- boxFullness com capacidade por caixa ---------- */
ok('boxFullness lotada na capacidade da caixa', boxFullness(10, 10).cls === 'full');
ok('boxFullness com folga p/ capacidade grande', boxFullness(5, 20).cls === 'ok');
ok('boxFullness near em ~80% da capacidade', boxFullness(8, 10).cls === 'near');
ok('boxCapacity padrao = SUGGEST_FULL', boxCapacity({}) === SUGGEST_FULL && boxCapacity({capacity:12}) === 12);

/* ---------- photoHashJs (ref por conteudo, fallback puro deterministico) ---------- */
ok('photoHashJs deterministico (mesma entrada -> mesmo hash)', photoHashJs('abc') === photoHashJs('abc'));
ok('photoHashJs distingue conteudos diferentes', photoHashJs('abc') !== photoHashJs('abd'));
ok('photoHashJs devolve hex', /^[0-9a-f]+$/.test(photoHashJs('xyz')));

/* ---------- sortResults (ordenação) ---------- */
state = { config:CFG, boxes:[], items:[
  { id:'i1', name:'Zebra', category:'Jardinagem', updatedAt:100 },
  { id:'i2', name:'Alfa', category:'Ferramentas manuais', updatedAt:200 }
], tomb:{boxes:{},items:{}}, meta:{} };
searchSort='rec'; ok('sort recentes (updatedAt desc)', sortResults(state.items)[0].id==='i2');
searchSort='az';  ok('sort A-Z por nome', sortResults(state.items)[0].id==='i2');
searchSort='rec';

/* ---------- mergeLog (histórico: união + clearedAt + teto) ---------- */
var L1 = { log:[{id:'e1',ts:1000},{id:'e2',ts:2000}], meta:{} };
var L2 = { log:[{id:'e2',ts:2000},{id:'e3',ts:3000}], meta:{} };
var ml = mergeLog(L1, L2, 0);
ok('mergeLog une por id (3 eventos)', ml.length===3);
ok('mergeLog clearedAt corta antigos', mergeLog(L1, L2, 2500).length===1 && mergeLog(L1,L2,2500)[0].id==='e3');

/* ---------- topCategory (inferir categoria pelo nome, no "Onde guardar?") ---------- */
ok('topCategory pega a categoria mais frequente', topCategory([
  { category:'Material elétrico' }, { category:'Material elétrico' }, { category:'Jardinagem' }
]) === 'Material elétrico');
ok('topCategory ignora itens sem categoria', topCategory([{ category:'' }, { category:'Jardinagem' }]) === 'Jardinagem');

/* ---------- filtro "Em uso" (busca só itens retirados) ---------- */
state = { config:CFG, boxes:[{id:'b1',code:'C-01'}], items:[
  { id:'i1', name:'Furadeira', category:'Ferramentas manuais', boxId:'b1', out: Date.now() },
  { id:'i2', name:'Martelo', category:'Ferramentas manuais', boxId:'b1' }
], tomb:{boxes:{},items:{}}, meta:{} };
ok('só itens com out são "em uso"', state.items.filter((it) => it.out).length === 1 && state.items.filter((it) => it.out)[0].id === 'i1');
ok('busca por nome acha item retirado (Furadeira)', searchItems('furadeira','').length === 1 && searchItems('furadeira','')[0].id === 'i1');

/* ---------- fmtBytes (barra de armazenamento) ---------- */
ok('fmtBytes formata bytes', fmtBytes(512) === '512 B');
ok('fmtBytes formata KB', fmtBytes(2048) === '2.0 KB');
ok('fmtBytes formata MB', /MB$/.test(fmtBytes(5 * 1024 * 1024)));

/* ---------- filtro "Sem caixa": órfão (sem caixa, não solto) vs solto de propósito ---------- */
var orphans = [
  { id:'o1', name:'Item órfão', boxId:'' },
  { id:'o2', name:'Solto de propósito', boxId:'', loose:true },
  { id:'o3', name:'Na caixa', boxId:'b1' }
].filter((it) => !it.boxId && !it.loose);
ok('só órfãos contam no filtro Sem caixa (exclui loose)', orphans.length === 1 && orphans[0].id === 'o1');

out.push('ERRORS: ' + (window.__errs.length ? window.__errs.join(' | ') : 'none'));
out.push((fail || window.__errs.length) ? 'RESULT: FAIL' : 'RESULT: PASS');
document.getElementById('out').textContent = out.join('\n');
</script>
</body></html>
